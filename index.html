function makePlayers(){
  return RAW.map((r,i)=>{
    const loc = LOCATIONS.find(l=>l.name===r[1]) || LOCATIONS[0];
    return {
      id: 'p'+(i+1),
      name: r[0],
      location: r[1],
      group: i % 2 === 0 ? 'Молодша' : 'Старша',
      dob: '',
      age: '',
      payment: 'Не оплачено',
      debt: loc.price,
      notes: '',
      attendance: {},
      number: i+1
    };
  });
}

function seedState(){
  return {
    tab:'dashboard',
    q:'',
    locationFilter:'Усі',
    monthFilter:new Date().getMonth(),
    players:makePlayers(),
    adminName:'',
    adminPhone:'',
    adminLocation:LOCATIONS[0].name,
    adminGroup:'Молодша',
    tacticsFormation:'4-3-3',
    savedBoards: [],
    markers: [],
    payroll: {},
    locationRent: {}
  };
}

const app = {
  state: seedState(),

  load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        this.state = {...seedState(), ...parsed};
      }
    }catch(e){}
    if(!Array.isArray(this.state.players) || !this.state.players.length){
      this.state.players = makePlayers();
    }
    if(!Array.isArray(this.state.markers) || !this.state.markers.length){
      this.state.markers = this.defaultMarkers(this.state.tacticsFormation);
    }
    this.ensureExtraLocations();
    this.render();
  },

  ensureExtraLocations(){
    LOCATIONS.forEach(loc=>{
      const has = this.state.players.some(p=>p.location===loc.name);
      if(!has){
        // keep empty location available in app
      }
    });
  },

  save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(this.state));
  },

  esc(s){
    return String(s ?? '').replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
  },

  setTab(tab){
    this.state.tab = tab;
    this.render();
  },

  setQuery(v){
    this.state.q = v;
    this.renderLocations();
  },

  setLocationFilter(v){
    this.state.locationFilter = v;
    this.renderLocations();
  },

  setMonth(v){
    this.state.monthFilter = Number(v);
    this.render();
  },

  tabsHtml(){
    return TABS.map(([key,label])=>`<button class="tab ${this.state.tab===key?'active':''}" onclick="app.setTab('${key}')">${label}</button>`).join('');
  },

  renderTabs(){
    document.getElementById('tabs').innerHTML = this.tabsHtml();
  },

  showView(name){
    document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));
    const target = document.getElementById(`view-${name}`) || document.getElementById('view-dashboard');
    target.classList.remove('hidden');
  },

  filteredPlayers(){
    return this.state.players.filter(p=>{
      const q = this.state.q.trim().toLowerCase();
      const okQ = !q || p.name.toLowerCase().includes(q) || String(p.number).includes(q);
      const okLoc = this.state.locationFilter==='Усі' || p.location===this.state.locationFilter;
      return okQ && okLoc;
    });
  },

  sessions(){
    const month = this.state.monthFilter;
    const year = YEAR;
    const last = new Date(year, month+1, 0).getDate();
    const out = [];
    for(let day=1; day<=last; day++){
      const d = new Date(year, month, day);
      const wd = WEEKDAYS[d.getDay()];
      LOCATIONS.forEach(loc=>{
        if((loc.days||[]).includes(wd)){
          out.push({
            date:`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`,
            day:wd,
            location:loc.name,
            trainer:loc.trainer
          });
        }
      });
    }
    return out;
  },

  todaySessions(){
    const today = new Date();
    const wd = WEEKDAYS[today.getDay()];
    const date = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    return LOCATIONS.filter(loc=>(loc.days||[]).includes(wd)).map(loc=>({
      date, day:wd, location:loc.name, trainer:loc.trainer
    }));
  },

  locationCount(name){
    return this.state.players.filter(p=>p.location===name).length;
  },

  paymentStats(){
    const paid = this.state.players.filter(p=>p.payment==='Оплачено').length;
    const partial = this.state.players.filter(p=>p.payment==='Частково').length;
    const unpaid = this.state.players.filter(p=>p.payment==='Не оплачено').length;
    const income = this.state.players.reduce((s,p)=>{
      if(p.payment==='Оплачено') return s + Number(p.debt||0);
      if(p.payment==='Частково') return s + Math.round(Number(p.debt||0)/2);
      return s;
    },0);
    return {paid,partial,unpaid,income};
  },

  attendanceStats(){

        else if(v==='Не був') absent++;
        else if(v==='Запізнився') late++;

    const month = `${YEAR}-${String(this.state.calendarMonth+1).padStart(2,'0')}`;
    const paidPlayers = this.state.players.filter(p=>p.payment==='Оплачено').length;
    const partialPlayers = this.state.players.filter(p=>p.payment==='Частково').length;
    const debtors = this.state.players.filter(p=>p.payment!=='Оплачено').length;
    const playerIncome = this.state.players.reduce((s,p)=> s + (p.payment==='Оплачено' ? Number(p.debt||0) : p.payment==='Частково' ? Math.round(Number(p.debt||0)/2) : 0), 0);

    const payrollEntries = Object.keys(this.state.payroll || {}).filter(k=>k.startsWith(month+'_'));
    const payrollTotal = payrollEntries.reduce((s,k)=> s + Number((this.state.payroll[k]||{}).salary || 0), 0);
    const payrollPaid = payrollEntries.filter(k => (this.state.payroll[k]||{}).paid).length;

    const rentEntries = Object.keys(this.state.locationRent || {}).filter(k=>k.startsWith(month+'_'));
    const rentTotal = rentEntries.reduce((s,k)=> s + Number((this.state.locationRent[k]||{}).amount || 0), 0);
    const rentPaid = rentEntries.filter(k => (this.state.locationRent[k]||{}).paid).length;

    return { month, paidPlayers, partialPlayers, debtors, playerIncome, payrollTotal, payrollPaid, rentTotal, rentPaid };
  },

  renderCalendarMonth(){
    const month = this.state.monthFilter;
    const year = YEAR;
    const first = new Date(year, month, 1);
    const last = new Date(year, month+1, 0).getDate();
    const start = first.getDay();
    let html = `<div class="calendar">${WEEKDAYS.map(w=>`<div class="small muted" style="text-align:center">${w}</div>`).join('')}`;
    for(let i=0;i<start;i++) html += `<div class="day" style="opacity:.3"></div>`;
    for(let d=1; d<=last; d++){
      const date = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const items = this.sessions().filter(s=>s.date===date);
      html += `<div class="day"><div class="date">${d}</div>${items.map(i=>`<div class="session">${i.location} • ${i.trainer}</div>`).join('')}</div>`;
    }
    html += `</div>`;
    return html;
  },

  setFormation(f){

  renderTactics(){

      <div class="panel">

            <div class="panel-title">Тактична дошка</div>

    this.drawMarkers();

  drawMarkers(){
    const board = document.getElementById('board');
    if(!board) return;
    board.querySelectorAll('.marker').forEach(m=>m.remove());

    this.state.markers.forEach(m=>{
      const el = document.createElement('div');
      el.className = `marker ${m.c}`;
      el.style.left = m.x + '%';
      el.style.top = m.y + '%';
      el.dataset.id = m.id;
      el.innerHTML = `<span>${m.l}</span>`;
      let active = false;
      const move = (clientX, clientY)=>{
        const rect = board.getBoundingClientRect();
        const x = Math.max(6, Math.min(94, ((clientX - rect.left) / rect.width) * 100));
        const y = Math.max(6, Math.min(94, ((clientY - rect.top) / rect.height) * 100));
        m.x = x; m.y = y;
        el.style.left = x+'%'; el.style.top = y+'%';
      };
      el.addEventListener('pointerdown', ev=>{
        active = true;
        el.setPointerCapture(ev.pointerId);
      });
      el.addEventListener('pointermove', ev=>{
        if(!active) return;
        move(ev.clientX, ev.clientY);
      });
      el.addEventListener('pointerup', ()=>{
        active = false;
        this.save();
      });
      el.addEventListener('pointercancel', ()=>{
        active = false;
        this.save();
      });
      board.appendChild(el);
    });
  },

  resetBoard(){
    this.state.markers = this.defaultMarkers(this.state.tacticsFormation);

    this.state.players.unshift({

      group:this.state.adminGroup,
      dob:'',
      age:'',
      payment:'Не оплачено',
      debt:loc.price,
      notes:`Телефон: ${this.state.adminPhone || ''}`,
      attendance:{},
      number:this.state.players.length+1

    this.state.adminName='';
    this.state.adminPhone='';
    this.save();
    this.render();
    this.setTab('locations');

  },

  savePlayer(id){
    const p = this.state.players.find(x=>x.id===id);

  deletePlayer(id){
    if(!confirm('Видалити гравця?')) return;

  closeSheet(){
    document.getElementById('sheetWrap').classList.remove('show');

  exportJson(){
    const blob = new Blob([JSON.stringify(this.state,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'fenomen-hub.json';
    a.click();
    URL.revokeObjectURL(a.href);
  },

  exportCsv(){
    const rows = [['ПІБ','Локація','Група','Оплата','Сума','Примітки']];
    this.state.players.forEach(p=>rows.push([p.name,p.location,p.group,p.payment,p.debt,p.notes]));
    const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'fenomen-hub.csv';
    a.click();
    URL.revokeObjectURL(a.href);
  },

  importJson(file){
    const fr = new FileReader();
    fr.onload = ()=>{
      try{
        const parsed = JSON.parse(fr.result);
        this.state = {...seedState(), ...parsed};
        if(!Array.isArray(this.state.markers) || !this.state.markers.length){
          this.state.markers = this.defaultMarkers(this.state.tacticsFormation || '4-3-3');
        }
        this.save();
        this.render();
      }catch(e){
        alert('Помилка імпорту JSON');
      }
    };
    fr.readAsText(file);
  },

  resetAll(){
    if(!confirm('Скинути всі дані?')) return;
    localStorage.removeItem(STORAGE_KEY);
    this.state = seedState();

    this.renderFinanceView();
    this.renderDebtors();
    this.renderTrainers();
    this.renderTactics();
    this.renderAdmin();
    this.renderExport();
  }
};
